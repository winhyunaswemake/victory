      :root {
        color-scheme: light;

        --muted: #6f655e;
        --line: #eadfd8;
        --orange: #ff5a14;
        --teal: #0f766e;
        --bg: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(255, 90, 20, 0.08), rgba(255, 255, 255, 0) 42%),
          var(--bg);
        color: var(--ink);
        font-family:

          ui-sans-serif,
          system-ui,
          -apple-system,

          "Segoe UI",

        letter-spacing: 0;
      }

      main {
        width: min(92vw, 680px);
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 24px 60px rgba(20, 17, 15, 0.08);
      }

      .mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        font-weight: 900;
        font-size: 22px;
      }

      h1 {
        margin: 28px 0 14px;
        font-size: clamp(32px, 6vw, 54px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.75;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        margin-top: 28px;
        padding: 0 20px;
        border-radius: 8px;
        background: var(--orange);
        color: #fff;
        font-size: 15px;
        font-weight: 900;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid rgba(255, 90, 20, 0.28);
        outline-offset: 3px;
      }

      small {
        display: block;
        margin-top: 18px;
        color: var(--teal);
        font-size: 13px;
        font-weight: 800;
      }

      @media (max-width: 560px) {
        main {
          padding: 28px;
        }
      }
    </style>
