<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://showers-rabbit-challenging-tag.trycloudflare.com/r/github_pages" />

    />
    <link rel="canonical" href="https://showers-rabbit-challenging-tag.trycloudflare.com/offer" />
    <style>
      :root {
        color-scheme: light;
        --ink: #07111f;
        --muted: #5b6878;
        --line: #dfe8e4;
        --green: #14a56a;
        --green-dark: #087348;
        --bg: #f6faf7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0;
      }

      main {
        width: min(92vw, 680px);
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 24px 60px rgba(7, 17, 31, 0.08);
      }

      .mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        font-weight: 900;
        font-size: 22px;
      }

      h1 {
        margin: 28px 0 14px;
        font-size: clamp(32px, 6vw, 54px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.75;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        margin-top: 28px;
        padding: 0 20px;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        font-size: 15px;
        font-weight: 900;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid rgba(20, 165, 106, 0.36);
        outline-offset: 3px;
      }

      small {
        display: block;
        margin-top: 18px;
        color: var(--green-dark);
        font-size: 13px;
        font-weight: 800;
      }

      @media (max-width: 560px) {
        main {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">V</div>
      <h1>내일 아침, 오늘 할 일이 먼저 정리됩니다</h1>

      <small>월 6,900원 · 이메일 구매요청</small>
    </main>
  </body>
</html>
